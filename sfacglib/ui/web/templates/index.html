<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFACG Downloader</title>
    <style>
        :root { --bg: #0f0f23; --card: #1a1a2e; --accent: #00d4ff; --text: #eee; --border: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        .header { background: var(--card); padding: 16px 24px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid var(--border); }
        .header h1 { color: var(--accent); font-size: 24px; }
        .nav { display: flex; gap: 8px; }
        .nav button { background: none; border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        .nav button.active, .nav button:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .main { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border-radius: 12px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #aaa; font-size: 14px; }
        input, select { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        .row { display: flex; gap: 12px; }
        .row > * { flex: 1; }
        .checkbox { display: flex; align-items: center; gap: 8px; }
        .checkbox input { width: auto; }
        button { background: var(--accent); color: #000; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .output { background: var(--bg); border-radius: 8px; padding: 16px; margin-top: 16px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px; white-space: pre-wrap; }
        .status { padding: 8px 12px; border-radius: 6px; margin-top: 12px; }
        .status.ok { background: #0a3; }
        .status.err { background: #a30; }
        .hidden { display: none; }
        .library { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
        .book-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color 0.2s; }
        .book-card:hover { border-color: var(--accent); }
        .book-card h3 { font-size: 16px; margin-bottom: 8px; }
        .book-card .type { font-size: 12px; color: #888; }
        .reader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 100; overflow-y: auto; }
        .reader-header { background: var(--card); padding: 16px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 101; border-bottom: 1px solid var(--border); }
        .reader-header button { background: none; border: 1px solid var(--border); color: var(--text); padding: 8px 16px; }
        .reader-content { max-width: 800px; margin: 0 auto; padding: 24px; }
        .reader-content h2 { color: var(--accent); margin: 24px 0 12px; }
        .reader-content .chapter { margin-bottom: 32px; line-height: 1.8; }
        .comic-reader { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 24px; }
        .comic-reader img { max-width: 100%; border-radius: 8px; }
        .toc { position: fixed; left: 0; top: 60px; bottom: 0; width: 280px; background: var(--card); border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; z-index: 102; }
        .toc.hidden { display: none; }
        .toc h3 { margin-bottom: 12px; color: var(--accent); }
        .toc a { display: block; padding: 8px; color: var(--text); text-decoration: none; border-radius: 4px; font-size: 14px; }
        .toc a:hover { background: var(--bg); }
        .toc .section { color: #888; font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SFACG</h1>
        <div class="nav">
            <button class="active" onclick="showPage('download')">下载</button>
            <button onclick="showPage('library')">书库</button>
            <button onclick="showPage('tasks')">任务</button>
            <button onclick="showPage('settings')">设置</button>
        </div>
    </div>

    <div class="main">
        <div id="download" class="page">
            <div class="card">
                <h2>小说下载</h2>
                <div class="form-group">
                    <label>小说ID或URL</label>
                    <input type="text" id="novel-nid" placeholder="输入小说ID或URL">
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>格式</label>
                        <select id="novel-format">
                            <option value="epub">EPUB</option>
                            <option value="md">Markdown</option>
                            <option value="txt">TXT</option>
                            <option value="html">HTML</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>输出目录</label>
                        <input type="text" id="novel-output" value="~/Download">
                    </div>
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="novel-reviews">
                    <label>下载评论</label>
                </div>
                <button onclick="downloadNovel()">下载小说</button>
                <div id="novel-output-log" class="output hidden"></div>
            </div>

            <div class="card">
                <h2>漫画下载</h2>
                <div class="form-group">
                    <label>漫画URL</label>
                    <input type="text" id="comic-url" placeholder="输入漫画URL">
                </div>
                <div class="form-group">
                    <label>输出目录</label>
                    <input type="text" id="comic-output" value="~/Download">
                </div>
                <button onclick="downloadComic()">下载漫画</button>
                <div id="comic-output-log" class="output hidden"></div>
            </div>

            <div class="card">
                <h2>有声下载</h2>
                <div class="form-group">
                    <label>有声小说ID</label>
                    <input type="text" id="audio-id" placeholder="输入有声小说ID">
                </div>
                <div class="form-group">
                    <label>输出目录</label>
                    <input type="text" id="audio-output" value="~/Download">
                </div>
                <button onclick="downloadAudio()">下载有声</button>
                <div id="audio-output-log" class="output hidden"></div>
            </div>
        </div>

        <div id="library" class="page hidden">
            <div class="card">
                <h2>书库</h2>
                <div class="form-group">
                    <label>路径</label>
                    <input type="text" id="library-path" value="~/Download">
                    <button onclick="loadLibrary()" style="margin-top: 8px;">刷新</button>
                </div>
                <div id="library-list" class="library"></div>
            </div>
        </div>

        <div id="tasks" class="page hidden">
            <div class="card">
                <h2>任务</h2>
                <button onclick="refreshTasks()">刷新</button>
                <div id="task-list" style="margin-top: 16px;"></div>
            </div>
        </div>

        <div id="settings" class="page hidden">
            <div class="card">
                <h2>Cookie</h2>
                <div class="form-group">
                    <label>粘贴Cookie</label>
                    <input type="text" id="cookie" placeholder="粘贴Cookie">
                </div>
                <button onclick="importCookie()">导入</button>
                <div id="cookie-status" class="status hidden"></div>
            </div>
        </div>
    </div>

    <div id="reader" class="reader hidden">
        <div class="reader-header">
            <button onclick="closeReader()">返回</button>
            <button onclick="toggleToc()">目录</button>
            <span id="reader-title"></span>
        </div>
        <div id="toc" class="toc hidden"></div>
        <div id="reader-content" class="reader-content"></div>
    </div>

    <script>
        let currentPage = 'download';
        let currentReader = null;

        function showPage(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(name).classList.remove('hidden');
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            currentPage = name;
            if (name === 'library') loadLibrary();
            if (name === 'tasks') refreshTasks();
        }

        async function api(url, data) {
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
            });
            return res.json();
        }

        function log(el, msg) {
            el.classList.remove('hidden');
            el.textContent += msg + '\n';
            el.scrollTop = el.scrollHeight;
        }

        async function downloadNovel() {
            const el = document.getElementById('novel-output-log');
            el.classList.remove('hidden');
            el.textContent = '';
            log(el, '开始下载...');

            try {
                const res = await api('/api/novel', {
                    nid: document.getElementById('novel-nid').value,
                    format: document.getElementById('novel-format').value,
                    output: document.getElementById('novel-output').value.replace('~', ''),
                    reviews: document.getElementById('novel-reviews').checked,
                });
                log(el, res.message || res.detail);
            } catch (e) {
                log(el, '错误: ' + e);
            }
        }

        async function downloadComic() {
            const el = document.getElementById('comic-output-log');
            el.classList.remove('hidden');
            el.textContent = '';
            log(el, '开始下载...');

            try {
                const res = await api('/api/comic', {
                    url: document.getElementById('comic-url').value,
                    output: document.getElementById('comic-output').value.replace('~', ''),
                });
                log(el, res.message || res.detail);
            } catch (e) {
                log(el, '错误: ' + e);
            }
        }

        async function downloadAudio() {
            const el = document.getElementById('audio-output-log');
            el.classList.remove('hidden');
            el.textContent = '';
            log(el, '开始下载...');

            try {
                const res = await api('/api/audio', {
                    id: document.getElementById('audio-id').value,
                    output: document.getElementById('audio-output').value.replace('~', ''),
                });
                log(el, res.message || res.detail);
            } catch (e) {
                log(el, '错误: ' + e);
            }
        }

        async function loadLibrary() {
            const path = document.getElementById('library-path').value.replace('~', '');
            const res = await fetch('/api/library?path=' + encodeURIComponent(path));
            const items = await res.json();

            const el = document.getElementById('library-list');
            el.innerHTML = items.map(item => `
                <div class="book-card" onclick="openReader('${item.path}', '${item.type}')">
                    <h3>${item.title}</h3>
                    <div class="type">${item.type}</div>
                </div>
            `).join('');
        }

        async function openReader(path, type) {
            const endpoint = type === 'comic' ? '/api/reader/comic/' : '/api/reader/novel/';
            const res = await fetch(endpoint + encodeURIComponent(path));
            const data = await res.json();

            document.getElementById('reader').classList.remove('hidden');
            document.getElementById('reader-title').textContent = data.title;

            if (type === 'comic') {
                renderComicReader(data);
            } else {
                renderNovelReader(data);
            }
        }

        function renderNovelReader(data) {
            const toc = document.getElementById('toc');
            const content = document.getElementById('reader-content');

            let tocHtml = '<h3>目录</h3>';
            data.chapters.forEach((ch, i) => {
                tocHtml += `<div class="section">${ch.section}</div>`;
                tocHtml += `<a href="#ch-${i}" onclick="scrollToChapter(${i})">${ch.title}</a>`;
            });
            toc.innerHTML = tocHtml;

            let contentHtml = `<h1>${data.title}</h1>`;
            data.chapters.forEach((ch, i) => {
                contentHtml += `<div class="chapter" id="ch-${i}">`;
                contentHtml += `<h2>${ch.section} - ${ch.title}</h2>`;
                contentHtml += `<div>${ch.content.replace(/\n/g, '<br>')}</div>`;
                contentHtml += '</div>';
            });
            content.innerHTML = contentHtml;
        }

        function renderComicReader(data) {
            const toc = document.getElementById('toc');
            const content = document.getElementById('reader-content');

            let tocHtml = '<h3>目录</h3>';
            let lastSection = '';
            data.pages.forEach((page, i) => {
                if (page.section !== lastSection) {
                    tocHtml += `<div class="section">${page.section}</div>`;
                    lastSection = page.section;
                }
                tocHtml += `<a href="#page-${i}" onclick="scrollToChapter(${i})">${page.title}</a>`;
            });
            toc.innerHTML = tocHtml;

            let contentHtml = `<h1>${data.title}</h1><div class="comic-reader">`;
            data.pages.forEach((page, i) => {
                contentHtml += `<img id="page-${i}" src="${page.url}" alt="${page.title}" loading="lazy">`;
            });
            contentHtml += '</div>';
            content.innerHTML = contentHtml;
        }

        function scrollToChapter(i) {
            const el = document.getElementById(`ch-${i}`) || document.getElementById(`page-${i}`);
            if (el) el.scrollIntoView({behavior: 'smooth'});
        }

        function closeReader() {
            document.getElementById('reader').classList.add('hidden');
        }

        function toggleToc() {
            document.getElementById('toc').classList.toggle('hidden');
        }

        async function refreshTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();

            const el = document.getElementById('task-list');
            el.innerHTML = Object.entries(tasks).map(([id, task]) => `
                <div style="padding: 12px; background: var(--bg); border-radius: 8px; margin-bottom: 8px;">
                    <strong>${task.title || id}</strong>
                    <span style="float: right; color: ${task.status === 'done' ? '#0a3' : task.status === 'error' ? '#a30' : '#aa0'}">${task.status}</span>
                </div>
            `).join('') || '<p>暂无任务</p>';
        }

        async function importCookie() {
            const el = document.getElementById('cookie-status');
            try {
                const res = await api('/api/cookie', {cookie: document.getElementById('cookie').value});
                el.className = 'status ok';
                el.textContent = res.message || res.detail;
            } catch (e) {
                el.className = 'status err';
                el.textContent = '导入失败';
            }
            el.classList.remove('hidden');
        }
    </script>
</body>
</html>
